name: Build for all platforms

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: Windows
            ext: .exe
            sep: ';'
          - os: ubuntu-latest
            name: Linux
            ext: ''
            sep: ':'
          - os: macos-latest
            name: macOS
            ext: ''
            sep: ':'

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install FFmpeg (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install FFmpeg (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install ffmpeg

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install server npm dependencies
        run: |
          cd bgutil-ytdlp-pot-provider/server
          npm install --omit=dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller yt-dlp bgutil-ytdlp-pot-provider

      - name: Download & bundle ffmpeg (Windows)
        if: runner.os == 'Windows'
        run: |
          curl -L -o ffmpeg-essentials.zip "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          python -c "import zipfile,os;z=zipfile.ZipFile('ffmpeg-essentials.zip');n=[x for x in z.namelist() if '/bin/ffmpeg.exe' in x];print('Found entries:', len(n));[(open('ffmpeg.exe','wb').write(z.read(x)),print('Extracted ffmpeg.exe ('+str(os.path.getsize('ffmpeg.exe'))+' bytes)')) for x in n]"
      - name: Bundle ffmpeg (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          ffmpeg_path="$(command -v ffmpeg)"
          if [ -n "$ffmpeg_path" ]; then
            cp "$ffmpeg_path" "./ffmpeg${{ matrix.ext }}"
            ls -la "./ffmpeg${{ matrix.ext }}"
          else
            echo "ffmpeg not found"
          fi

      - name: Build with PyInstaller
        run: |
          SEP="${{ matrix.sep }}"
          ADD_DATA=""
          if [ -d "bgutil-ytdlp-pot-provider/server" ]; then
            ADD_DATA="--add-data bgutil-ytdlp-pot-provider/server${SEP}bgutil-ytdlp-pot-provider/server"
            echo "Bundling PO Token server"
          fi
          if [ -f "./ffmpeg${{ matrix.ext }}" ]; then
            echo "Bundling ffmpeg"
            pyinstaller --onefile --add-binary "./ffmpeg${{ matrix.ext }}${SEP}." $ADD_DATA --name ytd-${{ matrix.name }} --clean --noconfirm ytd.py
          else
            echo "Building without ffmpeg"
            pyinstaller --onefile $ADD_DATA --name ytd-${{ matrix.name }} --clean --noconfirm ytd.py
          fi
          echo "Build complete for ${{ matrix.name }}"
          ls -la "dist/ytd-${{ matrix.name }}${{ matrix.ext }}"
          echo "FFmpeg bundled: $(if [ -f ./ffmpeg${{ matrix.ext }} ]; then echo 'YES'; else echo 'NO'; fi)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ytd-${{ matrix.name }}${{ matrix.ext }}
          path: dist/ytd-${{ matrix.name }}${{ matrix.ext }}

  create-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: ytd-*
          merge-multiple: true

      - name: Display structure
        run: ls -la

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: ytd-*
          body: |
            ## What's Changed

            - **PO Token server bundled** — Deno server files included in the .exe, PO Token generation works out of the box
            - **Client rotation** — 7-client fallback chain handles bot blocks automatically
            - **Progress bar fix** — works on Windows cp1252 terminals
            - **All deps inside project** — bgutil-ytdlp-pot-provider moved into repo

            ## Platform Binaries

            - **Windows**: `ytd-Windows.exe`
            - **Linux**: `ytd-Linux`
            - **macOS**: `ytd-macOS`
