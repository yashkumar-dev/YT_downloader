name: Build for all platforms

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: Windows
            ext: .exe
            sep: ';'
          - os: ubuntu-latest
            name: Linux
            ext: ''
            sep: ':'
          - os: macos-latest
            name: macOS
            ext: ''
            sep: ':'

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install FFmpeg (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install FFmpeg (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install ffmpeg

      - name: Install FFmpeg (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install ffmpeg -y

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller yt-dlp

      - name: Copy ffmpeg for bundling
        run: |
          ffmpeg_path=""
          if command -v ffmpeg >/dev/null 2>&1; then
            ffmpeg_path="$(command -v ffmpeg)"
          fi
          if [ -z "$ffmpeg_path" ] && [ -f "/c/ProgramData/chocolatey/bin/ffmpeg.exe" ]; then
            ffmpeg_path="/c/ProgramData/chocolatey/bin/ffmpeg.exe"
          fi
          if [ -z "$ffmpeg_path" ] && [ -f "/usr/bin/ffmpeg" ]; then
            ffmpeg_path="/usr/bin/ffmpeg"
          fi
          if [ -z "$ffmpeg_path" ] && [ -f "/usr/local/bin/ffmpeg" ]; then
            ffmpeg_path="/usr/local/bin/ffmpeg"
          fi
          if [ -z "$ffmpeg_path" ] && [ -f "/opt/homebrew/bin/ffmpeg" ]; then
            ffmpeg_path="/opt/homebrew/bin/ffmpeg"
          fi
          if [ -n "$ffmpeg_path" ]; then
            echo "Found ffmpeg at $ffmpeg_path"
            cp "$ffmpeg_path" "./ffmpeg${{ matrix.ext }}"
            ls -la "./ffmpeg${{ matrix.ext }}"
          else
            echo "ffmpeg not found"
          fi

      - name: Build with PyInstaller
        run: |
          if [ -f "./ffmpeg${{ matrix.ext }}" ]; then
            echo "Bundling ffmpeg"
            SEP="${{ matrix.sep }}"
            pyinstaller --onefile --add-binary "./ffmpeg${{ matrix.ext }}${SEP}." --name ytd-${{ matrix.name }} --clean --noconfirm ytd.py
          else
            echo "Building without ffmpeg"
            pyinstaller --onefile --name ytd-${{ matrix.name }} --clean --noconfirm ytd.py
          fi
          echo "Build complete for ${{ matrix.name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ytd-${{ matrix.name }}${{ matrix.ext }}
          path: dist/ytd-${{ matrix.name }}${{ matrix.ext }}

  create-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: ytd-*
          merge-multiple: true

      - name: Display structure
        run: ls -la

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: ytd-*
          body: |
            ## What's New in v1.2

            - **FFmpeg bundled** — high-quality video (1080p/4K) works out of the box, no separate install needed
            - **Video Download**: Best / 4K / 1080p / 720p / 480p quality presets
            - **Audio Extract**: Best / 320k / 192k / 128k / 64k bitrate options
            - **Playlist Support**: Download all, pick range, or select individual videos by title
            - **YouTube Search**: Type any query directly — no URL needed
            - **Smart Detection**: Auto-detects video, playlist, or video-in-playlist URLs
            - **Info Preview**: Shows title, duration, and resolution before downloading
            - **Download History**: Press `h` to view past downloads with saved paths
            - **Path Memory**: Remembers last download folder
            - **Skip Existing**: Skips files already downloaded

            ## Platform Binaries

            - **Windows**: `ytd-Windows.exe`
            - **Linux**: `ytd-Linux`
            - **macOS**: `ytd-macOS`
