name: Build for all platforms

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: Windows
            ext: .exe
            sep: ';'
          - os: ubuntu-latest
            name: Linux
            ext: ''
            sep: ':'
          - os: macos-latest
            name: macOS
            ext: ''
            sep: ':'

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install FFmpeg (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install FFmpeg (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install ffmpeg

      - name: Install FFmpeg (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install ffmpeg -y

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller yt-dlp

      - name: Build with PyInstaller (bundling ffmpeg)
        run: |
          ffmpeg_path="$(which ffmpeg 2>/dev/null || true)"
          if [ -z "$ffmpeg_path" ]; then
            echo "ffmpeg not found, building without it"
            pyinstaller --onefile --name ytd-${{ matrix.name }} --clean --noconfirm ytd.py
          else
            echo "Bundling ffmpeg from $ffmpeg_path"
            pyinstaller --onefile --add-binary "$ffmpeg_path${{ matrix.sep }}." --name ytd-${{ matrix.name }} --clean --noconfirm ytd.py
          fi
          echo "Build complete for ${{ matrix.name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ytd-${{ matrix.name }}${{ matrix.ext }}
          path: dist/ytd-${{ matrix.name }}${{ matrix.ext }}

  create-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: ytd-*
          merge-multiple: true

      - name: Display structure
        run: ls -la

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: ytd-*
          body: |
            ## What's New

            - **Video Download**: Best / 4K / 1080p / 720p / 480p quality presets
            - **Audio Extract**: Best / 320k / 192k / 128k / 64k bitrate options
            - **Playlist Support**: Download all, pick range, or select individual videos by title
            - **YouTube Search**: Type any query directly — no URL needed
            - **Smart Detection**: Auto-detects video, playlist, or video-in-playlist URLs
            - **Info Preview**: Shows title, duration, and resolution before downloading
            - **Download History**: Press `h` to view past downloads with saved paths
            - **Path Memory**: Remembers last download folder
            - **Skip Existing**: Skips files already downloaded

            ## Platform Binaries

            - **Windows**: `ytd-Windows.exe` (~15.5 MB)
            - **Linux**: `ytd-Linux` (~29.7 MB)
            - **macOS**: `ytd-macOS` (~14.4 MB)

            ## Usage

            ```
            ./ytd-Windows.exe   # Windows
            ./ytd-Linux         # Linux
            ./ytd-macOS         # macOS
            ```

            Requires **FFmpeg** installed for best-quality video+audio merging. Without FFmpeg, falls back to best single-stream file.
